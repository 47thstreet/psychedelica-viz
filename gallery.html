<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PSYCHEDELICA // Gallery</title>
  <meta name="description" content="PSYCHEDELICA Video Gallery - Audio-reactive visualizations rendered in real-time">
  <meta property="og:title" content="PSYCHEDELICA Gallery">
  <meta property="og:description" content="Audio-reactive visualizations rendered in real-time">
  <meta property="og:type" content="website">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a001a;
      color: #e0d0f0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
    }

    /* ─── Header ─── */
    .gallery-header {
      text-align: center;
      padding: 40px 20px 30px;
      border-bottom: 1px solid rgba(155,89,182,0.25);
      background: linear-gradient(180deg, rgba(10,0,26,1) 0%, rgba(15,0,30,1) 100%);
    }

    .gallery-header h1 {
      font-size: 28px;
      letter-spacing: 8px;
      color: #9b59b6;
      text-shadow: 0 0 25px rgba(155,89,182,0.6);
      margin-bottom: 6px;
    }

    .gallery-header .tagline {
      font-size: 11px;
      letter-spacing: 5px;
      color: rgba(155,89,182,0.5);
    }

    .gallery-header nav {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .gallery-header nav a {
      color: #c9a0dc;
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 6px 14px;
      border: 1px solid rgba(155,89,182,0.3);
      transition: all 0.2s;
    }

    .gallery-header nav a:hover {
      background: rgba(155,89,182,0.2);
      border-color: #9b59b6;
      color: #fff;
    }

    .gallery-header nav a.active {
      background: rgba(155,89,182,0.35);
      border-color: #9b59b6;
      color: #fff;
      text-shadow: 0 0 8px rgba(155,89,182,0.8);
    }

    /* ─── Toolbar ─── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(155,89,182,0.15);
      flex-wrap: wrap;
      gap: 10px;
    }

    .toolbar .filter-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: rgba(155,89,182,0.1);
      border: 1px solid rgba(155,89,182,0.25);
      color: #c9a0dc;
      padding: 4px 10px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      background: rgba(155,89,182,0.25);
      border-color: #9b59b6;
    }

    .filter-btn.active {
      background: rgba(155,89,182,0.35);
      border-color: #9b59b6;
      color: #fff;
    }

    .filter-btn[data-genre="psytrance"] { border-color: rgba(231,76,60,0.4); color: #e74c3c; }
    .filter-btn[data-genre="psytrance"].active { background: rgba(231,76,60,0.25); border-color: #e74c3c; color: #fff; }
    .filter-btn[data-genre="deep-house"] { border-color: rgba(52,152,219,0.4); color: #3498db; }
    .filter-btn[data-genre="deep-house"].active { background: rgba(52,152,219,0.25); border-color: #3498db; color: #fff; }
    .filter-btn[data-genre="techno"] { border-color: rgba(243,156,18,0.4); color: #f39c12; }
    .filter-btn[data-genre="techno"].active { background: rgba(243,156,18,0.25); border-color: #f39c12; color: #fff; }
    .filter-btn[data-genre="ambient"] { border-color: rgba(46,204,113,0.4); color: #2ecc71; }
    .filter-btn[data-genre="ambient"].active { background: rgba(46,204,113,0.25); border-color: #2ecc71; color: #fff; }
    .filter-btn[data-genre="dnb"] { border-color: rgba(155,89,182,0.5); color: #9b59b6; }
    .filter-btn[data-genre="dnb"].active { background: rgba(155,89,182,0.3); border-color: #9b59b6; color: #fff; }

    .toolbar .sort-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toolbar .sort-group label {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(155,89,182,0.6);
    }

    .toolbar select {
      background: rgba(10,0,26,0.9);
      border: 1px solid rgba(155,89,182,0.3);
      color: #c9a0dc;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      padding: 4px 8px;
      cursor: pointer;
    }

    .toolbar select:focus { outline: none; border-color: #9b59b6; }

    /* ─── Stats bar ─── */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 32px;
      padding: 14px 24px;
      background: rgba(155,89,182,0.04);
      border-bottom: 1px solid rgba(155,89,182,0.12);
    }

    .stat-item {
      text-align: center;
    }

    .stat-item .stat-value {
      font-size: 20px;
      color: #9b59b6;
      text-shadow: 0 0 10px rgba(155,89,182,0.4);
    }

    .stat-item .stat-label {
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(155,89,182,0.5);
      margin-top: 2px;
    }

    /* ─── Video Grid ─── */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
      padding: 24px;
    }

    .video-card {
      background: rgba(155,89,182,0.05);
      border: 1px solid rgba(155,89,182,0.2);
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .video-card:hover {
      border-color: rgba(155,89,182,0.5);
      box-shadow: 0 0 30px rgba(155,89,182,0.1);
      transform: translateY(-2px);
    }

    .video-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #0d0020;
      overflow: hidden;
      cursor: pointer;
    }

    .video-thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-thumb .thumb-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10,0,26,0.5);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .video-card:hover .thumb-overlay {
      opacity: 1;
    }

    .play-icon {
      width: 50px;
      height: 50px;
      border: 2px solid rgba(155,89,182,0.7);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .play-icon::after {
      content: '';
      display: block;
      width: 0;
      height: 0;
      border-left: 18px solid rgba(155,89,182,0.8);
      border-top: 11px solid transparent;
      border-bottom: 11px solid transparent;
      margin-left: 4px;
    }

    .video-thumb .duration {
      position: absolute;
      bottom: 6px;
      right: 6px;
      background: rgba(10,0,26,0.8);
      padding: 2px 6px;
      font-size: 10px;
      color: #c9a0dc;
      letter-spacing: 1px;
    }

    .video-info {
      padding: 12px 14px;
    }

    .video-info .video-title {
      font-size: 13px;
      color: #e0d0f0;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .video-info .video-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 10px;
      color: rgba(155,89,182,0.5);
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .video-info .video-meta .views {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .video-info .video-meta .views::before {
      content: '';
      display: inline-block;
      width: 10px;
      height: 7px;
      border: 1px solid rgba(155,89,182,0.4);
      border-radius: 50%;
    }

    .video-info .video-meta .date {
      color: rgba(155,89,182,0.4);
    }

    .video-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
    }

    .tag {
      font-size: 9px;
      letter-spacing: 1px;
      padding: 2px 7px;
      border: 1px solid rgba(155,89,182,0.25);
      color: #c9a0dc;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tag:hover {
      background: rgba(155,89,182,0.2);
      border-color: #9b59b6;
    }

    .tag.genre { border-color: rgba(231,76,60,0.3); color: rgba(231,76,60,0.7); }
    .tag.mode { border-color: rgba(52,152,219,0.3); color: rgba(52,152,219,0.7); }
    .tag.palette { border-color: rgba(46,204,113,0.3); color: rgba(46,204,113,0.7); }

    .video-actions {
      display: flex;
      gap: 6px;
    }

    .action-btn {
      background: rgba(155,89,182,0.1);
      border: 1px solid rgba(155,89,182,0.25);
      color: #c9a0dc;
      padding: 4px 10px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: rgba(155,89,182,0.25);
      border-color: #9b59b6;
      color: #fff;
    }

    /* ─── Lightbox ─── */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.92);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 20px;
    }

    .lightbox.open { display: flex; }

    .lightbox-close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      color: #9b59b6;
      font-size: 28px;
      cursor: pointer;
      z-index: 210;
    }

    .lightbox-close:hover { color: #fff; }

    .lightbox video {
      max-width: 90%;
      max-height: 75vh;
      border: 1px solid rgba(155,89,182,0.3);
    }

    .lightbox-info {
      margin-top: 16px;
      text-align: center;
      max-width: 600px;
    }

    .lightbox-info h3 {
      font-size: 16px;
      letter-spacing: 3px;
      color: #9b59b6;
      margin-bottom: 8px;
    }

    .lightbox-info .lb-meta {
      font-size: 11px;
      color: rgba(155,89,182,0.5);
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    /* ─── Embed Modal ─── */
    .embed-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .embed-modal.open { display: flex; }

    .embed-box {
      background: #0d0020;
      border: 1px solid rgba(155,89,182,0.4);
      padding: 24px;
      width: 500px;
      max-width: 90%;
    }

    .embed-box h3 {
      font-size: 14px;
      letter-spacing: 3px;
      color: #3498db;
      margin-bottom: 16px;
      text-shadow: 0 0 12px rgba(52,152,219,0.4);
    }

    .embed-box label {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(155,89,182,0.6);
      display: block;
      margin-bottom: 4px;
    }

    .embed-box textarea, .embed-box input[type="text"] {
      width: 100%;
      background: rgba(10,0,26,0.8);
      border: 1px solid rgba(155,89,182,0.3);
      color: #c9a0dc;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 8px;
      resize: vertical;
      margin-bottom: 12px;
    }

    .embed-box textarea { min-height: 80px; }

    .embed-box textarea:focus, .embed-box input[type="text"]:focus {
      outline: none;
      border-color: #9b59b6;
    }

    .embed-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .embed-actions button {
      background: rgba(155,89,182,0.15);
      border: 1px solid rgba(155,89,182,0.3);
      color: #c9a0dc;
      padding: 6px 14px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    .embed-actions button:hover {
      background: rgba(155,89,182,0.3);
      border-color: #9b59b6;
      color: #fff;
    }

    .embed-actions .btn-copy {
      border-color: rgba(46,204,113,0.4);
      color: #2ecc71;
    }

    .embed-actions .btn-copy:hover {
      background: rgba(46,204,113,0.2);
      border-color: #2ecc71;
    }

    .embed-actions .btn-copy.copied {
      background: rgba(46,204,113,0.3);
      color: #fff;
    }

    /* ─── Empty state ─── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: rgba(155,89,182,0.4);
    }

    .empty-state h3 {
      font-size: 16px;
      letter-spacing: 4px;
      margin-bottom: 10px;
      color: rgba(155,89,182,0.5);
    }

    .empty-state p {
      font-size: 12px;
      letter-spacing: 1px;
      line-height: 1.8;
    }

    .empty-state a {
      color: #9b59b6;
      text-decoration: none;
      border-bottom: 1px solid rgba(155,89,182,0.3);
    }

    .empty-state a:hover { border-color: #9b59b6; }

    /* ─── Footer ─── */
    .gallery-footer {
      text-align: center;
      padding: 30px 20px;
      border-top: 1px solid rgba(155,89,182,0.15);
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(155,89,182,0.3);
    }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(10,0,26,0.5); }
    ::-webkit-scrollbar-thumb { background: rgba(155,89,182,0.3); border-radius: 3px; }

    /* ─── Responsive ─── */
    @media (max-width: 600px) {
      .video-grid { grid-template-columns: 1fr; padding: 12px; gap: 12px; }
      .toolbar { padding: 12px; }
      .stats-bar { gap: 16px; flex-wrap: wrap; }
      .gallery-header h1 { font-size: 20px; letter-spacing: 5px; }
    }
  </style>
</head>

        <button class="btn-copy" id="btn-copy-link">Copy Link</button>
        <button id="btn-close-embed">Close</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="gallery-footer">
    PSYCHEDELICA &mdash; AUDIO-REACTIVE VISUALIZATIONS

        return [];

          mode: 'tunnel',
          palette: 'neon',
          duration: '4:15',
          views: 10234,
          date: '2026-03-26',
          thumbnail: null,
          videoUrl: null,
        },
        {
          id: 'demo-12',
          title: 'Mono Mandala - Void Meditation',
          genre: 'ambient',
          mode: 'mandala',
          palette: 'monochrome',
          duration: '10:00',
          views: 3211,
          date: '2026-03-17',
          thumbnail: null,
          videoUrl: null,
        },
      ];

      return demos;
    }

    let galleryVideos = loadGallery();
    if (galleryVideos.length === 0) {
      galleryVideos = seedDemoVideos();
      saveGallery(galleryVideos);
    }

    // ─── Palette preview colors for thumbnails ──────────────────────
    const PALETTE_COLORS = {
      neon: ['#ff00ff', '#00ffff', '#ff0080'],
      vaporwave: ['#ff71ce', '#01cdfe', '#b967ff'],
      cosmic: ['#4a0e78', '#7b2fbe', '#c084fc'],
      'deep-void': ['#33004d', '#660066', '#990099'],
      infrared: ['#0000aa', '#cc0000', '#ff6600'],
      bioluminescence: ['#004466', '#00ccaa', '#00ffcc'],
      'sunset-acid': ['#cc3366', '#ff6633', '#ff9900'],
      monochrome: ['#ffffff', '#999999', '#666666'],
    };

    // ─── State ──────────────────────────────────────────────────────
    let activeFilter = 'all';
    let activeSort = 'newest';

    // ─── Render Gallery ─────────────────────────────────────────────
    const grid = document.getElementById('video-grid');
    const emptyState = document.getElementById('empty-state');

    function getFilteredVideos() {
      let videos = [...galleryVideos];

      if (activeFilter !== 'all') {
        videos = videos.filter(v => v.genre === activeFilter);
      }

      switch (activeSort) {
        case 'popular':
          videos.sort((a, b) => b.views - a.views);
          break;
        case 'title':
          videos.sort((a, b) => a.title.localeCompare(b.title));
          break;
        case 'newest':
        default:
          videos.sort((a, b) => new Date(b.date) - new Date(a.date));
          break;
      }

      return videos;
    }

    function formatViews(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return n.toString();
    }

    function generateThumbCanvas(video) {
      const c = document.createElement('canvas');
      c.width = 340;
      c.height = 191;
      const ctx = c.getContext('2d');
      const colors = PALETTE_COLORS[video.palette] || PALETTE_COLORS.neon;

      // Background gradient
      const bg = ctx.createRadialGradient(170, 96, 20, 170, 96, 180);
      bg.addColorStop(0, colors[0] + '40');
      bg.addColorStop(0.5, '#0a001a');
      bg.addColorStop(1, colors[2] + '20');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, 340, 191);

      // Mode-specific abstract art
      ctx.globalAlpha = 0.6;
      const cx = 170;
      const cy = 96;

      if (video.mode === 'kaleidoscope' || video.mode === 'mandala') {
        for (let s = 0; s < 8; s++) {
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate((s / 8) * Math.PI * 2);
          ctx.beginPath();
          ctx.arc(40, 0, 25 + s * 3, 0, Math.PI * 2);
          ctx.strokeStyle = colors[s % colors.length];
          ctx.lineWidth = 1.5;
          ctx.stroke();
          ctx.restore();
        }
      } else if (video.mode === 'tunnel') {
        for (let r = 6; r >= 0; r--) {
          ctx.beginPath();
          const sides = 6;
          const radius = 15 + r * 22;
          for (let i = 0; i <= sides; i++) {
            const angle = (i / sides) * Math.PI * 2 + r * 0.2;
            const x = cx + Math.cos(angle) * radius;
            const y = cy + Math.sin(angle) * radius;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.closePath();
          ctx.strokeStyle = colors[r % colors.length];
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
      } else if (video.mode === 'flow-field') {
        for (let i = 0; i < 60; i++) {
          const x = Math.random() * 340;
          const y = Math.random() * 191;
          const angle = Math.sin(x * 0.02) * Math.PI;
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x + Math.cos(angle) * 30, y + Math.sin(angle) * 30);
          ctx.strokeStyle = colors[i % colors.length] + '80';
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      } else if (video.mode === 'particle-burst') {
        for (let i = 0; i < 40; i++) {
          const angle = Math.random() * Math.PI * 2;
          const dist = 10 + Math.random() * 70;
          const x = cx + Math.cos(angle) * dist;
          const y = cy + Math.sin(angle) * dist;
          ctx.beginPath();
          ctx.arc(x, y, 1 + Math.random() * 3, 0, Math.PI * 2);
          ctx.fillStyle = colors[i % colors.length];
          ctx.fill();
        }
      } else if (video.mode === 'sacred-geometry') {
        for (let ring = 0; ring < 3; ring++) {
          const count = ring === 0 ? 1 : ring * 6;
          for (let i = 0; i < count; i++) {
            const angle = (i / count) * Math.PI * 2;
            const r = ring * 35;
            const x = cx + Math.cos(angle) * r;
            const y = cy + Math.sin(angle) * r;
            ctx.beginPath();
            ctx.arc(x, y, 18, 0, Math.PI * 2);
            ctx.strokeStyle = colors[ring % colors.length];
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      } else if (video.mode === 'lissajous') {
        ctx.beginPath();
        for (let i = 0; i <= 300; i++) {
          const t = (i / 300) * Math.PI * 2;
          const x = cx + Math.sin(3 * t + 0.5) * 60;
          const y = cy + Math.sin(2 * t) * 50;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.strokeStyle = colors[0];
        ctx.lineWidth = 1.5;
        ctx.stroke();
      } else if (video.mode === 'fractal-zoom') {
        for (let i = 0; i < 5; i++) {
          const s = 20 + i * 18;
          ctx.beginPath();
          ctx.arc(cx - 20 + i * 8, cy, s, 0, Math.PI * 2);
          ctx.strokeStyle = colors[i % colors.length] + '60';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      } else if (video.mode === 'metaballs') {
        for (let i = 0; i < 5; i++) {
          const x = cx + (i - 2) * 40 + Math.sin(i) * 20;
          const y = cy + Math.cos(i * 2) * 25;
          const grad = ctx.createRadialGradient(x, y, 0, x, y, 30);
          grad.addColorStop(0, colors[i % colors.length] + '80');
          grad.addColorStop(1, 'transparent');
          ctx.fillStyle = grad;
          ctx.fillRect(x - 30, y - 30, 60, 60);
        }
      } else {
        // waveform-morph or default
        ctx.beginPath();
        for (let x = 0; x < 340; x++) {
          const y = cy + Math.sin(x * 0.05) * 30 + Math.sin(x * 0.02) * 20;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.strokeStyle = colors[0];
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      ctx.globalAlpha = 1;
      return c.toDataURL();
    }

    function renderGallery() {
      const videos = getFilteredVideos();
      grid.innerHTML = '';

      if (videos.length === 0) {
        emptyState.style.display = 'block';
        grid.style.display = 'none';
      } else {
        emptyState.style.display = 'none';
        grid.style.display = 'grid';
      }

      for (const video of videos) {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.dataset.id = video.id;

        const thumbUrl = video.thumbnail || generateThumbCanvas(video);

        card.innerHTML = `
          <div class="video-thumb" data-action="play" data-id="${video.id}">
            <img src="${thumbUrl}" alt="${video.title}" style="width:100%;height:100%;object-fit:cover;">
            <div class="thumb-overlay">
              <div class="play-icon"></div>
            </div>
            <span class="duration">${video.duration}</span>
          </div>
          <div class="video-info">
            <div class="video-title">${video.title}</div>
            <div class="video-meta">
              <span class="views">${formatViews(video.views)} views</span>
              <span class="date">${video.date}</span>
            </div>
            <div class="video-tags">
              <span class="tag genre" data-tag-genre="${video.genre}">${video.genre}</span>
              <span class="tag mode">${video.mode}</span>
              <span class="tag palette">${video.palette}</span>
            </div>
            <div class="video-actions">
              <button class="action-btn" data-action="embed" data-id="${video.id}">Embed</button>
              <button class="action-btn" data-action="share" data-id="${video.id}">Share</button>
            </div>
          </div>
        `;

        grid.appendChild(card);
      }

      updateStats();
    }

    function updateStats() {
      const all = galleryVideos;
      document.getElementById('stat-videos').textContent = all.length;
      document.getElementById('stat-views').textContent = formatViews(
        all.reduce((sum, v) => sum + v.views, 0)
      );
      const genres = new Set(all.map(v => v.genre));
      document.getElementById('stat-genres').textContent = genres.size;
      const modes = new Set(all.map(v => v.mode));
      document.getElementById('stat-modes').textContent = modes.size;
    }

    // ─── Filters ────────────────────────────────────────────────────
    document.querySelector('.filter-group').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;

      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      activeFilter = btn.dataset.filter || btn.dataset.genre;
      renderGallery();
    });

    // Tag click filters
    document.getElementById('video-grid').addEventListener('click', (e) => {
      const tag = e.target.closest('.tag[data-tag-genre]');
      if (tag) {
        const genre = tag.dataset.tagGenre;
        activeFilter = genre;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        const matchBtn = document.querySelector(`.filter-btn[data-genre="${genre}"]`);
        if (matchBtn) matchBtn.classList.add('active');
        renderGallery();
        return;
      }
    });

    // Sort
    document.getElementById('sort-select').addEventListener('change', (e) => {
      activeSort = e.target.value;
      renderGallery();
    });

    // ─── Lightbox ───────────────────────────────────────────────────
    const lightbox = document.getElementById('lightbox');
    const lbVideo = document.getElementById('lightbox-video');
    const lbTitle = document.getElementById('lb-title');
    const lbMeta = document.getElementById('lb-meta');

    grid.addEventListener('click', (e) => {
      const playTarget = e.target.closest('[data-action="play"]');
      if (playTarget) {
        const id = playTarget.dataset.id;
        const video = galleryVideos.find(v => v.id === id);
        if (!video) return;

        // Increment view count
        video.views++;
        saveGallery(galleryVideos);

        lbTitle.textContent = video.title;
        lbMeta.textContent = `${video.genre} // ${video.mode} // ${video.palette} // ${video.duration} // ${formatViews(video.views)} views`;

        if (video.videoUrl) {
          lbVideo.src = video.videoUrl;
          lbVideo.style.display = 'block';
        } else {
          // Demo: show generated thumbnail as poster
          lbVideo.poster = generateThumbCanvas(video);
          lbVideo.src = '';
          lbVideo.style.display = 'block';
        }

        lightbox.classList.add('open');
        renderGallery(); // refresh view counts
        return;
      }

      // Embed button
      const embedTarget = e.target.closest('[data-action="embed"]');
      if (embedTarget) {
        openEmbedModal(embedTarget.dataset.id);
        return;
      }

      // Share button
      const shareTarget = e.target.closest('[data-action="share"]');
      if (shareTarget) {
        openEmbedModal(shareTarget.dataset.id);
        return;
      }
    });

    document.getElementById('lightbox-close').addEventListener('click', () => {
      lightbox.classList.remove('open');
      lbVideo.pause();
      lbVideo.src = '';
    });

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) {
        lightbox.classList.remove('open');
        lbVideo.pause();
        lbVideo.src = '';
      }
    });

    // ─── Embed Modal ────────────────────────────────────────────────
    const embedModal = document.getElementById('embed-modal');
    const embedIframe = document.getElementById('embed-iframe');
    const embedLink = document.getElementById('embed-link');

    function openEmbedModal(videoId) {
      const video = galleryVideos.find(v => v.id === videoId);
      if (!video) return;

      const baseUrl = window.location.origin + window.location.pathname.replace('gallery.html', '');
      const videoPageUrl = baseUrl + 'gallery.html?v=' + video.id;

      embedIframe.value = `<iframe src="${videoPageUrl}" width="640" height="360" frameborder="0" allowfullscreen style="border:1px solid rgba(155,89,182,0.3);background:#0a001a;"></iframe>`;
      embedLink.value = videoPageUrl;

      embedModal.classList.add('open');

      // Social share URLs
      const title = encodeURIComponent(video.title + ' - PSYCHEDELICA');
      const url = encodeURIComponent(videoPageUrl);

      document.getElementById('share-twitter').onclick = () => {
        window.open(`https://twitter.com/intent/tweet?text=${title}&url=${url}`, '_blank', 'width=600,height=400');
      };
      document.getElementById('share-facebook').onclick = () => {
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank', 'width=600,height=400');
      };
      document.getElementById('share-reddit').onclick = () => {
        window.open(`https://reddit.com/submit?url=${url}&title=${title}`, '_blank', 'width=600,height=400');
      };
    }

    document.getElementById('btn-close-embed').addEventListener('click', () => {
      embedModal.classList.remove('open');
    });

    embedModal.addEventListener('click', (e) => {
      if (e.target === embedModal) embedModal.classList.remove('open');
    });

    // Copy buttons
    document.getElementById('btn-copy-embed').addEventListener('click', function() {
      embedIframe.select();
      navigator.clipboard.writeText(embedIframe.value);
      this.textContent = 'Copied!';
      this.classList.add('copied');
      setTimeout(() => {
        this.textContent = 'Copy Embed';
        this.classList.remove('copied');
      }, 2000);
    });

    document.getElementById('btn-copy-link').addEventListener('click', function() {
      embedLink.select();
      navigator.clipboard.writeText(embedLink.value);
      this.textContent = 'Copied!';
      this.classList.add('copied');
      setTimeout(() => {
        this.textContent = 'Copy Link';
        this.classList.remove('copied');
      }, 2000);
    });

    // ─── Public API for batch renderer integration ──────────────────
    // The batch renderer in viz.js can call this to add completed videos
    window.psychedelicaGallery = {
      addVideo(videoData) {
        const video = {
          id: 'vid-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6),
          title: videoData.title || 'Untitled',
          genre: videoData.genre || 'techno',
          mode: videoData.mode || 'kaleidoscope',
          palette: videoData.palette || 'neon',
          duration: videoData.duration || '0:00',
          views: 0,
          date: new Date().toISOString().split('T')[0],
          thumbnail: videoData.thumbnail || null,
          videoUrl: videoData.videoUrl || null,
        };
        galleryVideos.unshift(video);
        saveGallery(galleryVideos);
        renderGallery();
        return video.id;
      },

      removeVideo(id) {
        galleryVideos = galleryVideos.filter(v => v.id !== id);
        saveGallery(galleryVideos);
        renderGallery();
      },

      getVideos() {
        return [...galleryVideos];
      },
    };

    // ─── URL param handling: auto-open video ────────────────────────
    const params = new URLSearchParams(window.location.search);
    const autoVideoId = params.get('v');

    // Initial render
    renderGallery();

    if (autoVideoId) {
      const video = galleryVideos.find(v => v.id === autoVideoId);
      if (video) {
        video.views++;
        saveGallery(galleryVideos);
        lbTitle.textContent = video.title;
        lbMeta.textContent = `${video.genre} // ${video.mode} // ${video.palette} // ${video.duration} // ${formatViews(video.views)} views`;
        lbVideo.poster = generateThumbCanvas(video);
        lbVideo.src = video.videoUrl || '';
        lbVideo.style.display = 'block';
        lightbox.classList.add('open');
      }
    }
  })();
  </script>
</body>
